name: Deploy Pages

# Automatic Pages deploys happen from the "Update packages" workflow, right
# after an update lands on main. This workflow is for manual, on-demand
# redeploys (e.g. after editing the site itself).
on:
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install site dependencies
        working-directory: site
        run: bun install --frozen-lockfile

      - name: Build static site
        working-directory: site
        run: bun run build

      - name: Add SPA fallback
        working-directory: site
        run: cp dist/client/index.html dist/client/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist/client

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
